# All In One Monorepo - Netlify Configuration
[build]
  # Putanja do Website koda
  base = "Website"
  # Komanda za build (izvršava se unutar Website foldera)
  command = "npm run build"
  # Folder koji se servira na internet (relativno u odnosu na base)
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Redirects za API funkcije
[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200
  force = true

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index"
  status = 200
  force = true

# Headeri za sigurnost i keširanje
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
